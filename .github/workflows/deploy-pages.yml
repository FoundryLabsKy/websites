name: Publish to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages is published from the gh-pages branch (creating that branch
# auto-enables Pages for the repo — the default GITHUB_TOKEN is not
# allowed to enable Pages via the API, so the actions/deploy-pages
# flow can't do first-time setup). This job just mirrors main to
# gh-pages; .nojekyll makes Pages serve the files verbatim.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git push -f origin gh-pages
